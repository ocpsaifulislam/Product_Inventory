# ===============================
# Application Name
# ===============================
spring.application.name=Inventory

# ===============================
# H2 Database Configuration
# ===============================
spring.datasource.driver-class-name=org.h2.Driver
# For file-based H2 (persistent storage)
#spring.datasource.url=jdbc:h2:file:./data/productdb;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
# FIXED: Added IF_EXISTS=FALSE to create new DB, and IF EXISTS to handle auth
#spring.datasource.url=jdbc:h2:file:./data/productdb;DB_CLOSE_ON_EXIT=FALSE;AUTO_SERVER=TRUE
#spring.datasource.url=jdbc:h2:file:./data/productdb;DB_CLOSE_ON_EXIT=FALSE;AUTO_SERVER=TRUE;TRACE_LEVEL_FILE=3;TRACE_LEVEL_SYSTEM_OUT=2
spring.datasource.url=jdbc:h2:file:./data/productdb;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE;TRACE_LEVEL_FILE=3;TRACE_LEVEL_SYSTEM_OUT=2
# For in-memory H2 (data lost on restart)
# spring.datasource.url=jdbc:h2:mem:productdb


# ===============================
# JPA / Hibernate Configuration
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
# Remove generate-ddl when ddl-auto is already set (redundant/can cause conflicts)
# spring.jpa.generate-ddl=true
spring.jpa.show-sql=true
# Optional: Format SQL for better readability in logs
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# H2 Console Configuration
# ===============================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Allow access from other machines (optional, for development only)
# spring.h2.console.settings.web-allow-others=true

# ===============================
# Logging Configuration
# ===============================
logging.level.com.inventory=DEBUG
logging.level.root=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# File logging
logging.file.name=logs/inventory-api.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=500MB